name: Release on update commit

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build signed release APK and create GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[update]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        shell: bash
        env:
          HIBIKI_RELEASE_KEYSTORE_BASE64: ${{ secrets.HIBIKI_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$HIBIKI_RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing GitHub secret: HIBIKI_RELEASE_KEYSTORE_BASE64"
            exit 1
          fi
          printf '%s' "$HIBIKI_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks

      - name: Build signed release APK
        env:
          HIBIKI_RELEASE_STORE_FILE: release-keystore.jks
          HIBIKI_RELEASE_STORE_PASSWORD: ${{ secrets.HIBIKI_RELEASE_STORE_PASSWORD }}
          HIBIKI_RELEASE_KEY_ALIAS: ${{ secrets.HIBIKI_RELEASE_KEY_ALIAS }}
          HIBIKI_RELEASE_KEY_PASSWORD: ${{ secrets.HIBIKI_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -n 1)
          echo "name=${VERSION_NAME:-0.0}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE:-0}" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          SAFE_SHA="${GITHUB_SHA::7}"
          TAG="update-v${{ steps.version.outputs.name }}-${{ github.run_number }}-${SAFE_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          cat > release-notes.md <<EOF
          Автоматический релиз по коммиту с \`[update]\`.

          Commit: ${GITHUB_SHA}
          Version: ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})
          Message: ${{ github.event.head_commit.message }}
          EOF

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/hibiki-${{ steps.version.outputs.name }}-${{ github.sha }}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Hibiki ${{ steps.version.outputs.name }} update ${{ github.run_number }}
          body_path: release-notes.md
          files: release/*.apk
          prerelease: true
