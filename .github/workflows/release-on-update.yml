name: Release on update commit

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build signed release APK and create GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[update]') ||
      contains(github.event.head_commit.message, '[prerelease]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        shell: bash
        env:
          # This secret must contain base64 of the real keystore file.
          # Your local file can be named without extension, for example:
          # C:\projects\keys\hibiki\hibiki
          HIBIKI_RELEASE_KEYSTORE_BASE64: ${{ secrets.HIBIKI_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$HIBIKI_RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing GitHub secret: HIBIKI_RELEASE_KEYSTORE_BASE64"
            echo "Create it from your local keystore file, for example in PowerShell:"
            echo "[Convert]::ToBase64String([IO.File]::ReadAllBytes('C:\projects\keys\hibiki\hibiki'))"
            exit 1
          fi

          printf '%s' "$HIBIKI_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/hibiki
          if [ ! -s app/hibiki ]; then
            echo "Decoded keystore is empty. Check HIBIKI_RELEASE_KEYSTORE_BASE64."
            exit 1
          fi

      - name: Validate release signing secrets
        shell: bash
        env:
          HIBIKI_RELEASE_STORE_PASSWORD: ${{ secrets.HIBIKI_RELEASE_STORE_PASSWORD }}
          HIBIKI_RELEASE_KEY_ALIAS: ${{ secrets.HIBIKI_RELEASE_KEY_ALIAS }}
          HIBIKI_RELEASE_KEY_PASSWORD: ${{ secrets.HIBIKI_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in HIBIKI_RELEASE_STORE_PASSWORD HIBIKI_RELEASE_KEY_ALIAS HIBIKI_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build signed release APK
        env:
          HIBIKI_RELEASE_STORE_FILE: hibiki
          HIBIKI_RELEASE_STORE_PASSWORD: ${{ secrets.HIBIKI_RELEASE_STORE_PASSWORD }}
          HIBIKI_RELEASE_KEY_ALIAS: ${{ secrets.HIBIKI_RELEASE_KEY_ALIAS }}
          HIBIKI_RELEASE_KEY_PASSWORD: ${{ secrets.HIBIKI_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Determine release version
        id: release
        shell: bash
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          normalize_version() {
            local value="$1"
            if [[ "$value" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "${value}.0"
            else
              echo "$value"
            fi
          }

          next_stable_version() {
            local current="$1"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$current"
            if (( patch >= 9 )); then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi
            echo "${major}.${minor}.${patch}"
          }

          BASE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          DEFAULT_STABLE_VERSION=$(normalize_version "${BASE_VERSION:-1.0}")
          LATEST_STABLE_TAG=$(
            git tag --list 'v*' --sort=-v:refname |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
              head -n 1 ||
              true
          )

          if [ -n "$LATEST_STABLE_TAG" ]; then
            LATEST_STABLE_VERSION="${LATEST_STABLE_TAG#v}"
            HAS_STABLE_RELEASE=true
          else
            LATEST_STABLE_VERSION="$DEFAULT_STABLE_VERSION"
            HAS_STABLE_RELEASE=false
          fi

          NEXT_STABLE_VERSION=$(next_stable_version "$LATEST_STABLE_VERSION")
          IS_PRERELEASE=false
          if [[ "${HEAD_COMMIT_MESSAGE:-}" == *"[prerelease]"* ]]; then
            IS_PRERELEASE=true
          fi

          if [ "$IS_PRERELEASE" = true ]; then
            TARGET_VERSION="$NEXT_STABLE_VERSION"
            LAST_PRERELEASE_NUMBER=$(
              git tag --list "v${TARGET_VERSION}-prerelease.*" |
                sed -nE "s/^v${TARGET_VERSION//./\\.}-prerelease\\.([0-9]+)$/\\1/p" |
                sort -nr |
                head -n 1 ||
                true
            )
            if [ -n "${LAST_PRERELEASE_NUMBER:-}" ]; then
              PRERELEASE_NUMBER=$((LAST_PRERELEASE_NUMBER + 1))
            else
              PRERELEASE_NUMBER=1
            fi
            RELEASE_VERSION="${TARGET_VERSION}-prerelease.${PRERELEASE_NUMBER}"
          else
            if [ "$HAS_STABLE_RELEASE" = true ]; then
              RELEASE_VERSION="$NEXT_STABLE_VERSION"
            else
              RELEASE_VERSION="$DEFAULT_STABLE_VERSION"
            fi
          fi

          TAG="v${RELEASE_VERSION}"
          PREVIOUS_TAG=$(
            git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags |
              grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-prerelease\.[0-9]+)?$' |
              head -n 1 ||
              true
          )

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

          {
            echo "## Fixes"
            echo
            git log --reverse --pretty=format:'- %s' "$COMMIT_RANGE" | sed -E 's/\[(update|prerelease)\][[:space:]]*//Ig'
            echo
          } > release-notes.md

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/hibiki-v${{ steps.release.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: v${{ steps.release.outputs.version }}
          body_path: release-notes.md
          files: release/*.apk
          prerelease: ${{ steps.release.outputs.is_prerelease }}
