name: Android release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Create a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    name: Build signed release APK and create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        shell: bash
        env:
          # This secret must contain base64 of the real keystore file.
          # Your local file can be named without extension, for example:
          # C:\projects\keys\hibiki\hibiki
          HIBIKI_RELEASE_KEYSTORE_BASE64: ${{ secrets.HIBIKI_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$HIBIKI_RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing GitHub secret: HIBIKI_RELEASE_KEYSTORE_BASE64"
            echo "Create it from your local keystore file, for example in PowerShell:"
            echo "[Convert]::ToBase64String([IO.File]::ReadAllBytes('C:\projects\keys\hibiki\hibiki'))"
            exit 1
          fi

          printf '%s' "$HIBIKI_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/hibiki
          if [ ! -s app/hibiki ]; then
            echo "Decoded keystore is empty. Check HIBIKI_RELEASE_KEYSTORE_BASE64."
            exit 1
          fi

      - name: Validate release signing secrets
        shell: bash
        env:
          HIBIKI_RELEASE_STORE_PASSWORD: ${{ secrets.HIBIKI_RELEASE_STORE_PASSWORD }}
          HIBIKI_RELEASE_KEY_ALIAS: ${{ secrets.HIBIKI_RELEASE_KEY_ALIAS }}
          HIBIKI_RELEASE_KEY_PASSWORD: ${{ secrets.HIBIKI_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in HIBIKI_RELEASE_STORE_PASSWORD HIBIKI_RELEASE_KEY_ALIAS HIBIKI_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Determine release version
        id: release
        shell: bash
        env:
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          BASE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)
          if [ -z "${BASE_VERSION:-}" ]; then
            echo "Could not read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [[ ! "$BASE_VERSION" =~ ^[0-9][0-9A-Za-z.+-]*$ ]]; then
            echo "Invalid versionName: $BASE_VERSION"
            echo "Set a valid versionName in app/build.gradle.kts before running the workflow."
            exit 1
          fi

          TARGET_VERSION="$BASE_VERSION"

          if [ "$IS_PRERELEASE" = true ]; then
            EXISTING_PRERELEASE_FOR_COMMIT=$(
              git tag --points-at HEAD --list "v${TARGET_VERSION}-prerelease.*" |
                head -n 1 ||
                true
            )
            if [ -n "${EXISTING_PRERELEASE_FOR_COMMIT:-}" ]; then
              echo "Commit HEAD has already been published as ${EXISTING_PRERELEASE_FOR_COMMIT}."
              echo "Refusing to create another prerelease from the same commit."
              exit 1
            fi

            LAST_PRERELEASE_NUMBER=$(
              git tag --list "v${TARGET_VERSION}-prerelease.*" |
                sed -nE "s/^v${TARGET_VERSION//./\\.}-prerelease\\.([0-9]+)$/\\1/p" |
                sort -nr |
                head -n 1 ||
                true
            )
            if [ -n "${LAST_PRERELEASE_NUMBER:-}" ]; then
              PRERELEASE_NUMBER=$((LAST_PRERELEASE_NUMBER + 1))
            else
              PRERELEASE_NUMBER=1
            fi
            RELEASE_VERSION="${TARGET_VERSION}-prerelease.${PRERELEASE_NUMBER}"
          else
            RELEASE_VERSION="$TARGET_VERSION"
          fi

          TAG="v${RELEASE_VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Release tag ${TAG} already exists. Bump versionName before running the workflow."
            exit 1
          fi

          if [ "$IS_PRERELEASE" = true ]; then
            PREVIOUS_TAG=$(
              git tag --list "v${TARGET_VERSION}-prerelease.*" --sort=-version:refname |
                head -n 1 ||
                true
            )
          fi

          if [ -z "${PREVIOUS_TAG:-}" ]; then
            PREVIOUS_TAG=$(
              git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags |
                grep -E '^v[0-9][0-9A-Za-z.+-]*$' |
                grep -v -- '-prerelease\.' |
                head -n 1 ||
                true
            )
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
          else
            COMMIT_RANGE="HEAD"
          fi

          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

          {
            echo "## What's changed"
            echo
            git log --reverse --pretty=format:'%s' "$COMMIT_RANGE" |
              awk -v version="$TARGET_VERSION" '$0 != version && $0 != "v" version { print "- " $0 }'
            echo
          } > release-notes.md

      - name: Build signed release APK
        env:
          HIBIKI_RELEASE_STORE_FILE: hibiki
          HIBIKI_RELEASE_STORE_PASSWORD: ${{ secrets.HIBIKI_RELEASE_STORE_PASSWORD }}
          HIBIKI_RELEASE_KEY_ALIAS: ${{ secrets.HIBIKI_RELEASE_KEY_ALIAS }}
          HIBIKI_RELEASE_KEY_PASSWORD: ${{ secrets.HIBIKI_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail

          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -s "$APK" ]; then
            echo "Release APK was not created: $APK"
            exit 1
          fi

          APKSIGNER=$(
            find "$ANDROID_HOME/build-tools" -type f -name apksigner -print |
              sort -V |
              tail -n 1
          )
          if [ -z "${APKSIGNER:-}" ]; then
            echo "apksigner was not found in Android SDK build-tools."
            exit 1
          fi

          "$APKSIGNER" verify --verbose --print-certs "$APK"

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/hibiki-v${{ steps.release.outputs.version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: v${{ steps.release.outputs.version }}
          body_path: release-notes.md
          files: release/*.apk
          prerelease: ${{ steps.release.outputs.is_prerelease }}
